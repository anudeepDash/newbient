<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newbi Entertainment &amp; Marketing</title>
  <meta name="description" content="Newbi Entertainment connects brands, colleges, and creators through talent management, live events, influencer marketing, and experiential campaigns." />
  
  <!-- Security Headers (Managed via vercel.json in production) -->
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.newbi.live/" />
  <meta property="og:title" content="Newbi Entertainment &amp; Marketing" />
  <meta property="og:description" content="Newbi Entertainment connects brands, colleges, and creators through talent management, live events, influencer marketing, and experiential campaigns." />
  <meta property="og:image" content="/og-image.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://www.newbi.live/" />
  <meta property="twitter:title" content="Newbi Entertainment &amp; Marketing" />
  <meta property="twitter:description" content="Newbi Entertainment connects brands, colleges, and creators through talent management, live events, influencer marketing, and experiential campaigns." />
  <meta property="twitter:image" content="/og-image.png" />
</head>

<body>
  <div id="root">
    <div style="height: 100vh; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; gap: 20px;">
      <div style="width: 40px; height: 40px; border: 3px solid rgba(57, 255, 20, 0.1); border-top-color: #39FF14; border-radius: 50%; animation: spin 1s linear infinite;"></div>
      <p style="color: #666; font-size: 10px; text-transform: uppercase; letter-spacing: 4px; font-weight: 900;">Initializing Newbi Hub</p>
    </div>
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </div>
  <script>
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      alert("PRODUCTION ERROR: " + msg + "\nAt: " + url + ":" + lineNo + ":" + columnNo);
      return false;
    };
    window.onunhandledrejection = function(event) {
      alert("UNHANDLED PROMISE: " + event.reason);
    };
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
